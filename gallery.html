<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Agrocare field gallery — photos from farms across India using certified organic inputs."/>
  <title>Gallery — AGRO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    body { background: #f5f0e8; font-family: "DM Sans", sans-serif; }
    .gallery-page-hero {
      padding: 100px 24px 60px;
      text-align: center;
      background: linear-gradient(180deg, #e8f5e8, #f5f0e8);
    }
    .gallery-page-hero .hero-eyebrow {
      color: #8b6914;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: block;
    }
    .gallery-page-hero h1 {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(36px, 6vw, 64px);
      color: #1a2e1a;
      font-weight: 400;
      margin: 0 0 16px;
    }
    .gallery-page-hero p { color: #7a8e6a; font-size: 16px; max-width: 480px; margin: 0 auto; }
    .gallery-full-grid {
      columns: 3 200px;
      gap: 12px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }
    .gallery-full-grid .gallery-col-item {
      break-inside: avoid;
      margin-bottom: 12px;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s;
      box-shadow: 0 4px 16px rgba(26, 61, 26, 0.1);
    }
    .gallery-full-grid .gallery-col-item:hover { transform: scale(1.02); }
    .gallery-full-grid img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
    }
    #gallery-lightbox {
      position: fixed; inset: 0; z-index: 5000;
      background: rgba(7,20,7,0.95);
      display: none; align-items: center; justify-content: center;
      backdrop-filter: blur(8px);
    }
    #gallery-lightbox.open { display: flex; }
    #gallery-lightbox img { max-width: 90vw; max-height: 88vh; border-radius: 12px; object-fit: contain; }
    #gallery-lightbox-close {
      position: absolute; top: 20px; right: 24px;
      background: rgba(247,244,238,0.1); border: 1px solid rgba(247,244,238,0.2);
      color: var(--cream); border-radius: 50%; width: 44px; height: 44px;
      font-size: 1.2rem; cursor: pointer;
    }
  </style>
</head>
<body>
  <header id="site-header">
    <a href="index.html" class="nav-logo" aria-label="Agrocare Home">
      <img src="assets/logo/agrocare-logo.png" alt="Agrocare" style="height:40px;width:auto"/>
    </a>
    <nav aria-label="Main navigation">
      <ul class="nav-links">
        <li><a href="index.html#why-us">Why Us</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="index.html#impact">Our Impact</a></li>
        <li><a href="our-stories.html">Stories</a></li>
        <li><a href="join.html">Join Us</a></li>
        <li><a href="about.html">About Us</a></li>
        <li class="nav-cta"><a href="enquiry.html">Enquire Now</a></li>
      </ul>
    </nav>
    <div class="nav-right">
      <button class="nav-hamburger" aria-label="Open menu"><span></span><span></span><span></span></button>
    </div>
  </header>
  <nav class="mobile-nav">
    <button type="button" class="mobile-nav-close" aria-label="Close menu">✕</button>
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="our-stories.html">Stories</a>
    <a href="join.html">Join Us</a>
    <a href="about.html">About Us</a>
    <a href="enquiry.html">Enquiry</a>
  </nav>

  <main>
    <section class="gallery-page-hero">
      <span class="hero-eyebrow">FIELD & FARM</span>
      <h1>Our Gallery</h1>
      <p>Real fields. Real results. Real Agrocare.</p>
    </section>

    <div class="gallery-full-grid" id="galleryGrid" data-gallery-dynamic aria-live="polite"></div>
  </main>

  <div id="gallery-lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
    <button id="gallery-lightbox-close" aria-label="Close">✕</button>
    <img id="gallery-lightbox-img" src="" alt="Gallery image"/>
  </div>

  <footer id="site-footer">
    <div class="footer-bottom">
      <p class="footer-copy">© 2025 AGRO. All rights reserved.</p>
      <div class="footer-legal">
        <a href="privacy.html">Privacy</a>
        <a href="policy.html">Terms & Conditions</a>
        <a href="index.html">Home</a>
      </div>
    </div>
  </footer>

  <script src="js/main.js" defer></script>
</body>
</html>
