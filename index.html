<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Agro</title>

    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body class="flex flex-col min-h-screen">
    <!-- Header Component -->
    <div id="header-plugin"></div>

    <!-- Main Content -->
    <main class="flex-1">
      <section class="max-w-6xl mx-auto px-6 py-24">
        <div class="max-w-3xl">
          <p
            class="inline-flex items-center rounded-full border border-stone-300 px-3 py-1 text-sm"
          >
            Sustainable Agriculture Platform
          </p>

          <h1
            class="mt-6 text-5xl md:text-6xl font-bold tracking-tight leading-tight"
          >
            Grow smarter with modern agricultural intelligence.
          </h1>

          <p class="mt-6 text-lg text-stone-600 max-w-2xl">
            Agro helps farmers, agribusinesses, and researchers access
            actionable insights, streamline workflows, and make better
            decisions through a clean, AI-powered experience.
          </p>

          <div class="mt-10 flex flex-wrap gap-4">
            <a
              href="#"
              class="rounded-lg bg-[#2C302E] px-6 py-3 text-white transition hover:opacity-90"
            >
              Get Started
            </a>

            <a
              href="#"
              class="rounded-lg border border-stone-300 px-6 py-3 transition hover:bg-stone-100"
            >
              Learn More
            </a>
          </div>
        </div>
      </section>
    </main>

    <!-- AI Assistant Component -->
    <div id="ai-assistant-plugin"></div>

    <!-- Footer Component -->
    <div id="footer-plugin"></div>

    <script src="js/main.js"></script>
  </body>
</html>
